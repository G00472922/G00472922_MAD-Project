<ion-item
  [lines]="isLastItem() ? 'none' : 'full'"
  button
  [routerLink]="['/movie-details', id()]"
>
  <ion-thumbnail slot="start">
    <img
      alt="{{ title() }}"
      src="{{
        poster() === '' || poster() === null
          ? 'https://ionicframework.com/docs/img/demos/thumbnail.svg'
          : `https://image.tmdb.org/t/p/w500${poster()}`
      }}"
    />
  </ion-thumbnail>
  <ion-label>{{ title() }}</ion-label>
</ion-item>
