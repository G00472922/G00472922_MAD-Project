<ion-card class="ion-display-flex ion-flex-column">
  <img
    alt="{{ title() }}"
    [src]="`https://image.tmdb.org/t/p/w500${poster()}`"
    class="ion-align-self-center"
  />
  <div class="ion-display-flex ion-flex-column ion-flex-grow-1">
    <ion-card-header>
      <ion-card-title>{{ title() }}</ion-card-title>
      <ion-card-subtitle>{{ releaseDate() }}</ion-card-subtitle>
    </ion-card-header>
    <ion-card-content class="ion-display-flex ion-flex-column ion-flex-grow-1">
      <p class="ion-padding-bottom">{{ overview() }}</p>
      <div class="ion-display-flex ion-flex-row ion-justify-content-between">
        <ion-button [routerLink]="['/movie-details', id()]">
          More Details
        </ion-button>
        <app-favourite-button
          [btnType]="'icon'"
          [id]="id()"
          [title]="title()"
          [poster]="poster()"
        ></app-favourite-button>
      </div>
    </ion-card-content>
  </div>
</ion-card>
