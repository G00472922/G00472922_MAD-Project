<ion-content>
  <ion-grid>
    <ion-row class="ion-align-items-stretch ion-margin-horizontal">
      @for (fave of (favourites$ | async); track $index) {
      <ion-col size="12" size-sm="6" size-md="4" size-lg="3" size-xl="2">
        <app-movie-card
          [id]="fave.id"
          [title]="fave.title"
          [poster]="fave.poster"
        ></app-movie-card>
      </ion-col>
      }
    </ion-row>
  </ion-grid>
</ion-content>
